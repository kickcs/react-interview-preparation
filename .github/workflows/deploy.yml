name: Build & Deploy

on:
  push:
    branches: [main]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Deploy to server
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            if [ -d /opt/react-interview-preparation/.git ]; then
              git -C /opt/react-interview-preparation pull origin main
            else
              git clone https://github.com/${{ github.repository }}.git /opt/react-interview-preparation
            fi
            cd /opt/react-interview-preparation
            docker compose -f docker-compose.prod.yml up -d --build --force-recreate
            docker image prune -f
